<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Leetcode question lable remover</title>

        <link rel="stylesheet" href="./bootstrap/bootstrap.min.css">
    </head>
<body class="d-flex align-items-center " style="font-size: 14.5px;"> 
    <div class="card shadow-lg rounded-4" style="width: 400px;" id="main">
        <div class="card-body d-flex justify-content-between align-content-center">
            <span class="d-flex justify-content-between align-content-center" style="width: 50%;">
                <img src="./icons_img/code.png" alt="" class="pe-3">
                <span>
                    <strong>LeetCode Helper</strong><br>
                    <small class="text-muted">
                        Clean . Focus . Solve
                    </small>
                </span>
            </span>
            <span style="width: 10%">
                <img src="./icons_img/setting.png" alt="icon16.png">
            </span>
        </div>
        <hr>
        <div class="card-body d-flex justify-content-between align-content-center">
            <span class="d-flex justify-content-between align-content-center">
                <img src="./icons_img/hidden.png" alt="" class="pe-3">
                <span>
                    <strong>Diffulty Labels</strong> <br>
                    <small class="text-muted">
                        Easy, Medium, Hard tags
                    </small>
                </span>
            </span>
            <span style="width: 20%;">
                <button id="toggle" class="btn btn-primary">Loading...</button>
            </span>
        </div>
        <hr>
       <div class="card-body d-flex justify-content-between align-content-center">
            <span class="d-flex justify-content-between align-content-center">
                <img src="./icons_img/increase.png" alt="" class="pe-3">
                <span>
                    <strong> Acceptance Rate </strong><br>
                    <small class="text-muted">
                        Remove acceptance percentage
                    </small> 
                </span>
            </span>
            <span>
                <button id="toggle" class="btn btn-primary">Loading...</button>
            </span>
        </div>

        <hr>
        <div class="card-body d-flex justify-content-between align-content-center">
            <span>
                <img src="./icons_img/checked.png" alt=""> Extension is Active
            </span>
            <span>
                <img src="./icons_img/heart.png" alt=""> Made by sandy with 
            </span>
        </div>
    </div>



    <script src="popup.js"></script>
</body>
</html>
